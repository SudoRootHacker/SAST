sonar.projectKey=sast-demo
sonar.projectName=sast-demo
sonar.sources=.

# Only scan source code
sonar.exclusions=vendor/**,reports/**,.scannerwork/**,coverage.xml,zap-report.html,**/*.html

# PHPUnit
sonar.php.coverage.reportPaths=coverage.xml

# Tests
sonar.tests=tests

# Encoding
sonar.sourceEncoding=UTF-8
